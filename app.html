// ============ CITY SLUG HELPERS ============
// Extract city slug from URL path: /waynesville → "waynesville", /app → null
function getCitySlugFromUrl() {
  const path = window.location.pathname.replace(/^\/+|\/+$/g, '').toLowerCase();
  // Reserved paths that are NOT city slugs
  const reserved = ['', 'app', 'landing', 'landing.html', 'index.html', '_cors_serve.html', '_transfer.html'];
  if (reserved.includes(path)) return null;
  // Only allow valid slug characters (letters, numbers, hyphens)
  if (/^[a-z0-9][a-z0-9-]*$/.test(path)) return path;
  return null;
}

// Generate a URL-safe slug from city name: "City of Waynesville" → "waynesville"
function generateCitySlug(cityName) {
  return cityName
    .toLowerCase()
    .replace(/^(city|town|village|borough)\s+(of\s+)?/i, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

// Fetch city config from Supabase by slug (public, no auth required)
async function fetchCityBySlug(slug) {
  if (!supabase || !slug) return null;
  try {
    const { data, error } = await supabase
      .from('cities')
      .select('*')
      .eq('slug', slug)
      .single();
    if (error || !data) return null;
    // Map Supabase row to app's cityConfig format
    return {
      id: data.id,
      slug: data.slug,
      cityName: data.name,
      logoUrl: data.logo_url || '',
      inviteCode: data.invite_code,
      tier: data.tier || 'starter',
      subscriptionStatus: data.subscription_status || 'trial',
      trialStart: data.trial_start,
      subscribedAt: data.subscribed_at,
      stripeCustomerId: data.stripe_customer_id,
      paymentFailedAt: data.payment_failed_at,
      extraSeats: data.extra_seats || 0,
      createdBy: data.created_by,
      createdAt: data.created_at,
      _fromSupabase: true
    };
  } catch (err) {
    console.warn('City lookup failed:', err);
    return null;
  }
}

// Save city config to Supabase
async function saveCityToSupabase(cityConfig) {
  if (!supabase || !cityConfig) return null;
  try {
    const slug = cityConfig.slug || generateCitySlug(cityConfig.cityName);
    const row = {
      slug,
      name: cityConfig.cityName,
      logo_url: cityConfig.logoUrl || null,
      invite_code: cityConfig.inviteCode,
      tier: cityConfig.tier || 'starter',
      subscription_status: cityConfig.subscriptionStatus || 'trial',
      trial_start: cityConfig.trialStart || new Date().toISOString(),
      subscribed_at: cityConfig.subscribedAt || null,
      stripe_customer_id: cityConfig.stripeCustomerId || null,
      extra_seats: cityConfig.extraSeats || 0,
      created_by: cityConfig.createdBy || null
    };

    if (cityConfig.id) {
      // Update existing
      const { data, error } = await supabase.from('cities').update(row).eq('id', cityConfig.id).select().single();
      if (error) throw error;
      return data;
    } else {
      // Insert new
      const { data, error } = await supabase.from('cities').insert(row).select().single();
      if (error) throw error;
      return data;
    }
  } catch (err) {
    console.warn('City save to Supabase failed:', err);
    return null;
  }
}

// ============ MAIN APP ============
function App() {
  const [loading, setLoading] = useState(true);
  const [splashFade, setSplashFade] = useState(false);
  const [user, setUser] = useState(null);
  const [authScreen, setAuthScreen] = useState('login'); // login, register, setup
  const [cityConfig, setCityConfig] = useState(null);
  const [citySlug, setCitySlug] = useState(getCitySlugFromUrl());
  const [cityNotFound, setCityNotFound] = useState(false);
  const [entries, setEntries] = useState([]);
  const [crew, setCrew] = useState([]);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [showSettings, setShowSettings] = useState(false);
  const [showSuperAdmin, setShowSuperAdmin] = useState(false);
  const [showCapture, setShowCapture] = useState(false);
  const [editingEntry, setEditingEntry] = useState(null);
  const [viewingEntry, setViewingEntry] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = (msg) => { setToast(msg); };

  // ---- LOAD DATA: URL slug → Supabase, fallback to localStorage ----
  useEffect(() => {
    const session = localStorage.getItem(STORAGE_KEYS.session);
    const config = localStorage.getItem(STORAGE_KEYS.cityConfig);
    const storedEntries = localStorage.getItem(STORAGE_KEYS.entries);
    const storedCrew = localStorage.getItem(STORAGE_KEYS.crewMembers);

    if (session) {
      const parsed = JSON.parse(session);
      if (parsed.status === 'deactivated') {
        localStorage.removeItem(STORAGE_KEYS.session);
      } else {
        setUser(parsed);
      }
    }
    if (storedEntries) setEntries(JSON.parse(storedEntries));
    if (storedCrew) setCrew(JSON.parse(storedCrew));

    // ---- CITY LOOKUP: prefer Supabase by slug, fallback to localStorage ----
    const slug = getCitySlugFromUrl();
    const isAppPath = window.location.pathname === '/app' || window.location.pathname === '/app/';
    const params = new URLSearchParams(window.location.search);

    if (slug && supabase) {
      // URL has a city slug (e.g. /waynesville) — fetch from Supabase
      fetchCityBySlug(slug).then(city => {
        if (city) {
          setCityConfig(city);
          setCitySlug(slug);
          // Also cache locally for offline use
          localStorage.setItem(STORAGE_KEYS.cityConfig, JSON.stringify(city));
        } else {
          // Slug not found in DB
          setCityNotFound(true);
        }
        setTimeout(() => setSplashFade(true), 800);
        setTimeout(() => setLoading(false), 1400);
      });
    } else if (isAppPath && !session && !params.get('checkout')) {
      // /app with no logged-in user and no checkout return → generic signup flow
      // Do NOT load cached city config — show clean sign-in / set-up-a-new-city screen
      setCityConfig(null);

      // Splash timer
      setTimeout(() => setSplashFade(true), 1500);
      setTimeout(() => setLoading(false), 2100);
    } else {
      // Logged-in user at /app, or checkout return — use localStorage city config
      if (config) setCityConfig(JSON.parse(config));

      // ---- HANDLE STRIPE CHECKOUT RETURN ----
      if (params.get('checkout') === 'success' && config) {
        const parsed = JSON.parse(config);
        parsed.subscriptionStatus = 'active';
        parsed.subscribedAt = new Date().toISOString();
        const tierFromUrl = params.get('tier');
        if (tierFromUrl && TIERS[tierFromUrl]) parsed.tier = tierFromUrl;
        else if (!parsed.tier) parsed.tier = 'starter';
        localStorage.setItem(STORAGE_KEYS.cityConfig, JSON.stringify(parsed));
        setCityConfig(parsed);
        // Also update Supabase if we have the city
        saveCityToSupabase(parsed);
        window.history.replaceState({}, '', window.location.pathname);
      }

      // If user is logged in and city has a slug, redirect to the city URL
      if (session && config) {
        const parsedConfig = JSON.parse(config);
        if (parsedConfig.slug && isAppPath) {
          window.history.replaceState({}, '', '/' + parsedConfig.slug);
        }
      }

      // Splash timer
      setTimeout(() => setSplashFade(true), 1500);
      setTimeout(() => setLoading(false), 2100);
    }
  }, []);

  // ---- PERSIST ----
  useEffect(() => {
    if (entries.length > 0) localStorage.setItem(STORAGE_KEYS.entries, JSON.stringify(entries));
  }, [entries]);
  useEffect(() => {
    if (crew.length > 0) localStorage.setItem(STORAGE_KEYS.crewMembers, JSON.stringify(crew));
  }, [crew]);
  useEffect(() => {
    if (cityConfig) localStorage.setItem(STORAGE_KEYS.cityConfig, JSON.stringify(cityConfig));
  }, [cityConfig]);

  // ---- AUTH HANDLERS ----
  const handleLogin = (userData) => {
    // Check if user is in crew list and not deactivated
    const crewList = JSON.parse(localStorage.getItem(STORAGE_KEYS.crewMembers) || '[]');
    const crewMember = crewList.find(c => c.email === userData.email);
    if (crewMember) {
      if (crewMember.status === 'deactivated') {
        showToast('Your account has been deactivated');
        return;
      }
      setUser({ ...crewMember, ...userData });
      localStorage.setItem(STORAGE_KEYS.session, JSON.stringify({ ...crewMember, ...userData }));
    } else {
      setUser(userData);
      localStorage.setItem(STORAGE_KEYS.session, JSON.stringify(userData));
    }
  };

  const handleJoin = (userData) => {
    setUser(userData);
    localStorage.setItem(STORAGE_KEYS.session, JSON.stringify(userData));
  };

  const handleLogout = async () => {
    if (supabase) {
      try { await supabase.auth.signOut(); } catch(e) {}
    }
    localStorage.removeItem(STORAGE_KEYS.session);
    setUser(null);
    setShowSettings(false);
    setAuthScreen('login');
  };

  const handleSetupComplete = async (config, setupUser) => {
    // Generate slug and save to Supabase
    const slug = generateCitySlug(config.cityName);
    const fullConfig = { ...config, slug };
    setCityConfig(fullConfig);
    setCitySlug(slug);

    // Save to Supabase
    const saved = await saveCityToSupabase(fullConfig);
    if (saved) {
      fullConfig.id = saved.id;
      setCityConfig(fullConfig);
      localStorage.setItem(STORAGE_KEYS.cityConfig, JSON.stringify(fullConfig));
      // Update URL to the city slug path
      window.history.replaceState({}, '', '/' + slug);
    }

    // Refresh crew from localStorage (admin was added during setup)
    const storedCrew = localStorage.getItem(STORAGE_KEYS.crewMembers);
    if (storedCrew) setCrew(JSON.parse(storedCrew));
    if (setupUser) {
      const adminUser = { ...setupUser, role: 'admin', status: 'active' };
      setUser(adminUser);
      localStorage.setItem(STORAGE_KEYS.session, JSON.stringify(adminUser));
    }
  };

  // ---- ENTRY HANDLERS ----
  const handleSaveEntry = (entry) => {
    setEntries(prev => {
      const idx = prev.findIndex(e => e.id === entry.id);
      if (idx >= 0) {
        const updated = [...prev];
        updated[idx] = entry;
        return updated;
      }
      return [entry, ...prev];
    });
    setShowCapture(false);
    setEditingEntry(null);
    showToast('Capture saved!');
  };

  const handleDeleteEntry = (entryId) => {
    setEntries(prev => prev.filter(e => e.id !== entryId));
    setViewingEntry(null);
    showToast('Entry deleted');
  };

  // ---- CREW HANDLERS ----
  const handleInvite = ({ name, email, departmentId, inviteCode }) => {
    const newMember = {
      id: generateId(), name, email,
      role: 'crew', status: 'invited',
      departmentId,
      inviteCode,
      invitedBy: user.id,
      createdAt: new Date().toISOString()
    };
    setCrew(prev => [...prev, newMember]);
    showToast(`Invite created for ${name} — code: ${inviteCode}`);
  };

  const handleDeactivate = (memberId) => {
    setCrew(prev => prev.map(c => c.id === memberId ? { ...c, status: 'deactivated' } : c));
    showToast('Member deactivated');
  };

  const handleReactivate = (memberId) => {
    setCrew(prev => prev.map(c => c.id === memberId ? { ...c, status: 'active' } : c));
    showToast('Member reactivated');
  };

  const handleDeleteMember = (memberId) => {
    setCrew(prev => prev.filter(c => c.id !== memberId));
    showToast('Member removed');
  };

  const handleResendCode = (member) => {
    const dept = cityConfig?.departments?.find(d => d.id === member.departmentId);
    // TODO: Send actual email via EmailJS when configured
    // For now, show the code and copy-ready info
    const appUrl = window.location.origin;
    const message = `Invite resent to ${member.email}\n\nCode: ${member.inviteCode}\nDepartment: ${dept?.name || 'N/A'}\nLink: ${appUrl}`;
    showToast(`Code resent to ${member.email}: ${member.inviteCode}`);
    console.log('📧 Invite Email Content:', {
      to: member.email,
      name: member.name,
      code: member.inviteCode,
      department: dept?.name,
      link: appUrl
    });
  };

  const handleUpdateConfig = (newConfig) => {
    setCityConfig(newConfig);
    showToast('Settings saved');
  };

  // ---- SPLASH ----
  if (loading) {
    return <SplashScreen cityConfig={cityConfig} fadeOut={splashFade} />;
  }

  // ---- 404: CITY NOT FOUND ----
  if (cityNotFound) {
    return (
      <div className="auth-screen">
        <div style={{ fontSize: 48, marginBottom: 16 }}>🏛️</div>
        <div className="auth-brand">{APP_NAME}</div>
        <div style={{ color: 'var(--text-secondary)', fontSize: 15, marginBottom: 24, maxWidth: 340, textAlign: 'center', lineHeight: 1.6 }}>
          We couldn't find a city at <strong>/{citySlug}</strong>. Double-check the URL or contact your city administrator.
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <a href="/" className="btn btn-primary" style={{ textDecoration: 'none' }}>Go to CivicPipeline Home</a>
          <button className="btn btn-outline" onClick={() => { setCityNotFound(false); setAuthScreen('setup'); }}>Set Up a New City</button>
        </div>
      </div>
    );
  }

  // ---- AUTH SCREENS ----
  if (!user) {
    if (authScreen === 'join') {
      return <JoinScreen onJoin={handleJoin} onSwitchToLogin={() => setAuthScreen('login')} cityConfig={cityConfig} />;
    }
    if (authScreen === 'setup') {
      return <AdminSetupScreen user={{ id: 'setup' }} onComplete={handleSetupComplete} />;
    }
    return <LoginScreen onLogin={handleLogin}
      onSwitchToJoin={() => setAuthScreen('join')}
      onSwitchToSetup={() => setAuthScreen('setup')}
      cityConfig={cityConfig} />;
  }

  // If no city config, show setup
  if (!cityConfig) {
    return <AdminSetupScreen user={user} onComplete={handleSetupComplete} />;
  }

  // ---- SUBSCRIPTION CHECK ----
  const trial = getTrialStatus(cityConfig);
  const subscriptionActive = isSubscriptionActive(cityConfig);
  const currentTier = getCityTier(cityConfig);

  // Lock screen if subscription not active — covers expired trials, failed payments,
  // AND cities that were created without going through Stripe at all.
  const hasNoSubscription = !cityConfig.subscriptionStatus && !cityConfig.trialCode;
  if (!subscriptionActive && user.role === 'admin' && (cityConfig.subscriptionStatus !== undefined || hasNoSubscription)) {
    const isFirstTime = hasNoSubscription;
    return (
      <div className="app-container">
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32, textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>{isFirstTime ? '🚀' : '🔒'}</div>
          <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 8 }}>
            {isFirstTime ? 'Choose Your Plan' : trial?.expired ? 'Your Trial Has Ended' : 'Subscription Inactive'}
          </h2>
          <p style={{ color: 'var(--text-secondary)', fontSize: 14, marginBottom: 24, maxWidth: 360 }}>
            {isFirstTime
              ? 'You\'re almost there! Select a plan below to start your 14-day free trial via Stripe. No charge until the trial ends.'
              : trial?.expired
                ? 'Your 14-day trial is over. Subscribe to continue using CivicPipeline. Your data is safe and will be available once you subscribe.'
                : 'Please update your payment to continue using CivicPipeline. Your data is preserved.'}
          </p>
          {!isFirstTime && (
            <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 16 }}>
              Current plan: <strong>{currentTier.name}</strong> — ${currentTier.price}/month
            </div>
          )}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, width: '100%', maxWidth: 320 }}>
            {Object.values(TIERS).map(t => (
              <button key={t.id} className="btn btn-primary btn-lg" style={{
                background: t.id === 'starter' ? 'var(--color-accent)' : 'var(--color-primary)',
                width: '100%'
              }}
                onClick={() => createCheckoutSession(t.id, cityConfig.cityName, user.email, 0)}>
                {t.name} — ${t.price}/mo
              </button>
            ))}
          </div>
          <button className="btn btn-outline" style={{ marginTop: 12 }} onClick={handleLogout}>Sign Out</button>
        </div>
      </div>
    );
  }

  // Block non-admin crew if subscription is inactive
  if (!subscriptionActive && user.role !== 'admin') {
    return (
      <div className="app-container">
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32, textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🔒</div>
          <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 8 }}>Access Paused</h2>
          <p style={{ color: 'var(--text-secondary)', fontSize: 14, marginBottom: 24, maxWidth: 320 }}>
            Your city's CivicPipeline subscription is currently inactive. Please contact your administrator to restore access.
          </p>
          <button className="btn btn-outline" onClick={handleLogout}>Sign Out</button>
        </div>
      </div>
    );
  }

  // ---- MAIN APP ----
  const isAdmin = user.role === 'admin';
  const tabs = [
    { id: 'dashboard', label: 'Home', icon: '🏠' },
    { id: 'capture', label: 'Capture', icon: '📸' },
    { id: 'departments', label: 'Depts', icon: '📁' },
    ...(isAdmin ? [{ id: 'crew', label: 'Crew', icon: '👥' }] : []),
    ...(isAdmin ? [{ id: 'export', label: 'Export', icon: '📤' }] : []),
  ];

  const handleTabClick = (tabId) => {
    if (tabId === 'capture') {
      setShowCapture(true);
      return;
    }
    setActiveTab(tabId);
  };

  // Trial banner info
  const trialBanner = trial && trial.active && cityConfig.subscriptionStatus === 'trial' ? trial : null;

  return (
    <div className="app-container">
      {/* Trial Countdown Banner */}
      {trialBanner && (
        <div style={{
          background: trialBanner.daysLeft <= 3 ? '#FEF2F2' : '#FFFBEB',
          borderBottom: '1px solid ' + (trialBanner.daysLeft <= 3 ? '#FECACA' : '#FDE68A'),
          padding: '8px 16px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          gap: 12,
          fontSize: 13,
          fontWeight: 600,
          color: trialBanner.daysLeft <= 3 ? '#991B1B' : '#92400E',
          flexShrink: 0
        }}>
          <span>{trialBanner.daysLeft <= 3 ? '⚠️' : '⏱️'}</span>
          <span>
            {trialBanner.daysLeft === 1
              ? 'Your trial ends tomorrow!'
              : `${trialBanner.daysLeft} days left in your free trial`}
          </span>
          {isAdmin && (
            <button
              onClick={() => createCheckoutSession(cityConfig.tier || 'starter', cityConfig.cityName, user.email, 0)}
              style={{
                background: trialBanner.daysLeft <= 3 ? '#DC2626' : '#D97706',
                color: '#fff',
                border: 'none',
                padding: '4px 14px',
                borderRadius: 6,
                fontSize: 12,
                fontWeight: 700,
                cursor: 'pointer',
                marginLeft: 4
              }}>
              Subscribe Now
            </button>
          )}
        </div>
      )}
      {/* Header */}
      <div className="app-header">
        {cityConfig.logoUrl ? (
          <img src={cityConfig.logoUrl} alt="Logo" className="header-logo" />
        ) : (
          <div className="header-logo-placeholder">🏛️</div>
        )}
        <div className="header-text">
          <div className="header-city">{cityConfig.cityName}</div>
          <div className="header-sub">{user.name || user.email}</div>
        </div>
        <div className="header-actions">
          {user.email === SUPER_ADMIN_EMAIL && (
            <button className="header-btn" onClick={() => setShowSuperAdmin(true)} title="Super Admin"
              style={{ fontSize: 12, background: 'rgba(239,68,68,0.3)', borderColor: 'rgba(239,68,68,0.5)' }}>👑</button>
          )}
          {user.role === 'admin' && (
            <button className="header-btn" onClick={() => setShowSettings(true)} title="Settings">⚙️</button>
          )}
          <button className="header-btn" onClick={handleLogout} title="Sign Out"
            style={{ fontSize: 14 }}>↪</button>
        </div>
      </div>

      {/* Trial Banner */}
      {trial && trial.active && (
        <div style={{
          background: trial.daysLeft <= 3 ? 'var(--color-danger)' : trial.daysLeft <= 7 ? 'var(--color-warning)' : 'var(--color-accent)',
          color: 'white', textAlign: 'center', padding: '8px 16px', fontSize: 13, fontWeight: 600
        }}>
          Trial: {trial.daysLeft} day{trial.daysLeft !== 1 ? 's' : ''} remaining
          {isAdmin && <span style={{ marginLeft: 8, opacity: 0.8, fontWeight: 400 }}>— Subscribe to keep your data</span>}
        </div>
      )}

      {/* Main Content */}
      <div className="main-content">
        {activeTab === 'dashboard' && (
          <DashboardView entries={entries} cityConfig={cityConfig} crew={crew} user={user}
            onCaptureClick={() => setShowCapture(true)} />
        )}
        {activeTab === 'departments' && (
          <DepartmentsView entries={entries} cityConfig={cityConfig} user={user}
            onEntryClick={setViewingEntry}
            onCaptureClick={() => setShowCapture(true)} />
        )}
        {activeTab === 'crew' && (
          <CrewView crew={crew} user={user} cityConfig={cityConfig}
            onInvite={handleInvite}
            onDeactivate={handleDeactivate}
            onReactivate={handleReactivate}
            onDeleteMember={handleDeleteMember}
            onResendCode={handleResendCode} />
        )}
        {activeTab === 'export' && (
          <ExportView entries={entries} cityConfig={cityConfig} />
        )}
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav">
        {tabs.map(tab => (
          <button key={tab.id}
            className={`nav-btn ${(tab.id === 'capture' ? showCapture : activeTab === tab.id) ? 'active' : ''}`}
            onClick={() => handleTabClick(tab.id)}>
            <span className="nav-icon">{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Capture View (overlay) */}
      {showCapture && (
        <CaptureView
          cityConfig={cityConfig}
          user={user}
          existingEntry={editingEntry}
          onSave={handleSaveEntry}
          onClose={() => { setShowCapture(false); setEditingEntry(null); }}
        />
      )}

      {/* Entry Detail View (overlay) */}
      {viewingEntry && (
        <EntryDetailView
          entry={viewingEntry}
          cityConfig={cityConfig}
          user={user}
          onClose={() => setViewingEntry(null)}
          onEdit={(entry) => { setViewingEntry(null); setEditingEntry(entry); setShowCapture(true); }}
          onDelete={handleDeleteEntry}
        />
      )}

      {/* Settings */}
      {showSettings && (
        <SettingsView
          cityConfig={cityConfig}
          user={user}
          onClose={() => setShowSettings(false)}
          onUpdateConfig={handleUpdateConfig}
          onLogout={handleLogout}
        />
      )}

      {/* Super Admin Dashboard */}
      {showSuperAdmin && (
        <SuperAdminDashboard onClose={() => setShowSuperAdmin(false)} />
      )}

      {/* Toast */}
      {toast && <Toast message={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

// ============ RENDER ============
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
